# Nginx reverse proxy for the Zoom Bot Platform.
#   Public domain (via Cloudflare) ->  this Nginx (port 80)  ->  Node app (127.0.0.1:3000)
#
# Gives clean URLs:  /home /schedule /history /host-bot   (no ".html" in the bar)
# and 301-redirects the ".html" forms to those clean paths.
#
# Install (on the Ubuntu VM):
#   sudo cp deploy/nginx/fnxpopulator.qzz.io.conf /etc/nginx/sites-available/fnxpopulator.qzz.io
#   sudo ln -s /etc/nginx/sites-available/fnxpopulator.qzz.io /etc/nginx/sites-enabled/
#   sudo nginx -t          # test the config
#   sudo systemctl reload nginx

# Proxy headers are set at server scope and inherited by every location that
# proxies (nginx inherits proxy_set_header only if the location sets none itself).

server {
    listen 80;
    listen [::]:80;
    server_name fnxpopulator.qzz.io;

    # Forward useful info to the Node app. CF-Connecting-IP holds the real
    # visitor IP because traffic arrives through Cloudflare's proxy.
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
    proxy_http_version 1.1;

    # Reasonable timeouts; bot launches can take a while server-side.
    proxy_connect_timeout 60s;
    proxy_send_timeout    120s;
    proxy_read_timeout    120s;

    # ── Root -> dashboard ────────────────────────────────────────────────────
    location = / {
        return 302 /home;
    }

    # ── Clean URLs -> real pages (served by the Node app) ────────────────────
    location = /home {
        proxy_pass http://127.0.0.1:3000/dashboard.html;
    }
    location = /schedule {
        proxy_pass http://127.0.0.1:3000/schedule.html;
    }
    location = /history {
        proxy_pass http://127.0.0.1:3000/history.html;
    }
    location = /host-bot {
        proxy_pass http://127.0.0.1:3000/host-bot.html;
    }

    # ── Hide the ".html" forms: send them to the clean path ──────────────────
    location = /dashboard.html { return 301 /home; }
    location = /schedule.html  { return 301 /schedule; }
    location = /history.html   { return 301 /history; }
    location = /host-bot.html  { return 301 /host-bot; }

    # ── Everything else (API, bot.html, assets, favicon) -> Node as-is ───────
    location / {
        proxy_pass http://127.0.0.1:3000;

        # Allow WebSocket upgrades in case any endpoint needs them.
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
    }
}
