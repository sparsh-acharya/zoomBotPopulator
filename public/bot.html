<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ZBP Bot</title>
  <style>
    /* The SDK toolbar must actually render so we can click "Join Audio", but the
       bot is headless and nobody sees it — so render at a usable size pushed
       off-screen. Never display:none (that breaks SDK media init). */
    #meetingSDKElement {
      position: absolute;
      top: 0;
      left: -99999px;
      width: 1024px;
      height: 768px;
      overflow: hidden;
    }
  </style>
</head>
<body>
  <div id="meetingSDKElement"></div>

  <script type="module">
    const SDK_URL = 'https://esm.sh/@zoom/meetingsdk@6.1.0/embedded';

    // ── Constants ────────────────────────────────────────────────────────────
    const SAFETY_CAP_MS = 3 * 60 * 60 * 1000; // always leave after 3h, any mode
    const CONNECTION_STATE_CLOSED = 'Closed';
    // Audio auto-join (UI-driven — Component View has no startAudio API).
    // The SDK audio module can take 20s+ to come up after join (much longer on a
    // loaded ARM VM running many bots), and while it loads the SDK rejects extra
    // start attempts with errorCode 6011 ("Computer audio has been loading").
    // So: give a long window, and re-click only occasionally — one click starts
    // the load; after that we mostly WAIT for it to finish rather than spam it.
    const AUDIO_JOIN_TIMEOUT_MS = 75_000;
    const AUDIO_POLL_INTERVAL_MS = 500;
    const AUDIO_CLICK_RETRY_MS = 10_000; // re-click sparingly; loading must not be interrupted
    // Keep re-asserting mute until the SDK confirms it (handles the connect/mute
    // race that otherwise leaves bots broadcasting the fake-device tone).
    const MUTE_CONFIRM_TIMEOUT_MS = 15_000;
    const MUTE_RETRY_INTERVAL_MS = 600;
    const AUDIO_JOIN_BUTTON_RE = /join audio|computer audio|join by computer/i;
    const sleep = (ms) => new Promise((r) => setTimeout(r, ms));
    // Substrings that, when present in a connection-change 'Closed' reason,
    // indicate the bot was removed by the host (vs. the meeting simply ending).
    const REMOVED_REASON_HINTS = ['kick', 'expel', 'remov'];

    // ── Status reporting (read by Playwright via window.__BOT_STATUS__) ────────
    window.__BOT_STATUS__ = 'joining';
    function setStatus(s) {
      window.__BOT_STATUS__ = s;
      console.log(`[Bot] status → ${s}`);
    }

    let client = null;
    let hasLeft = false;

    // hasLeft guard (agents.md §8) — prevents double client.leave().
    async function leave(reason) {
      if (hasLeft) return;
      hasLeft = true;
      try {
        // Component View uses leaveMeeting() (not leave(), which is Client View).
        if (client) await client.leaveMeeting();
      } catch (e) {
        console.error('[Bot] Leave error:', e?.message || e);
      }
      setStatus(reason);
    }
    // Exposed so botManager.stopBot() can request a graceful leave.
    window.__BOT_LEAVE__ = leave;

    // A clickable's searchable text: aria-label + text + title + class.
    function clickableLabel(el) {
      return [
        el.getAttribute('aria-label') || '',
        el.textContent || '',
        el.getAttribute('title') || '',
        el.className || '',
      ].join(' ');
    }

    // Find a clickable (button or role=button) whose label matches any matcher.
    function findClickable(scope, matchers) {
      const els = scope.querySelectorAll('button, [role="button"]');
      for (const el of els) {
        const label = clickableLabel(el);
        if (matchers.some((m) => m.test(label))) return el;
      }
      return null;
    }

    // Rich dump of every clickable so we can pin the audio selector from a run.
    function dumpButtons(scope, tag) {
      const items = [...scope.querySelectorAll('button, [role="button"]')].map((el) => ({
        a: (el.getAttribute('aria-label') || '').trim(),
        t: (el.getAttribute('title') || '').trim(),
        c: (el.className || '').toString().slice(0, 60),
      }));
      console.log(`[Bot] clickables ${tag} (${items.length}):`, JSON.stringify(items));
    }

    // Component View has no startAudio API — connect computer audio by clicking
    // the rendered "Join Audio" control, then mute. Best-effort: on failure the
    // bot stays silent (no mic) but still attends.
    async function connectAudio() {
      const root = document.getElementById('meetingSDKElement');
      const deadline = Date.now() + AUDIO_JOIN_TIMEOUT_MS;
      // Match by aria-label / text / title / class.
      const audioMatchers = [
        AUDIO_JOIN_BUTTON_RE, /\baudio\b/i, /unmute|\bmute\b/i, /microphone|\bmic\b/i, /voip/i,
      ];
      const isConnected = () => client.getCurrentUser()?.audio === 'computer';

      async function tryClick(scope, matchers) {
        const el = findClickable(scope, matchers);
        if (!el) return false;
        el.click();
        await sleep(400);
        // Some flows open a "Join Audio by Computer" popup appended to body.
        const popup = findClickable(document.body, [AUDIO_JOIN_BUTTON_RE]);
        if (popup && popup !== el) popup.click();
        return true;
      }

      // Click a Join Audio control, then mostly WAIT for the load to finish.
      // The first click uses the broad matcher (catches icon-only toolbars).
      // After a click lands we re-click only every AUDIO_CLICK_RETRY_MS and only
      // with the NARROW "Join Audio" matcher: once audio starts loading that
      // button becomes a mic/mute icon, so the narrow matcher finds nothing and
      // we stop clicking — letting the load complete instead of interrupting it
      // with errorCode 6011 ("Computer audio has been loading"), and never
      // toggling the mute button off by accident.
      let everClicked = false;
      let nextClickAt = 0;
      while (Date.now() < deadline) {
        if (isConnected()) break;
        if (Date.now() >= nextClickAt) {
          const matchers = everClicked ? [AUDIO_JOIN_BUTTON_RE] : audioMatchers;
          if (await tryClick(root, matchers)) {
            everClicked = true;
          } else if (!everClicked) {
            // Fallback: the mic control may be under the "More" overflow menu.
            const more = findClickable(root, [/^\s*more\s*$/i]);
            if (more) {
              more.click();
              await sleep(700);
              if (await tryClick(document.body, audioMatchers)) everClicked = true;
            }
          }
          nextClickAt = Date.now() + AUDIO_CLICK_RETRY_MS;
        }
        await sleep(AUDIO_POLL_INTERVAL_MS);
      }

      if (!isConnected()) {
        if (!everClicked) {
          dumpButtons(root, 'toolbar');
          dumpButtons(document.body, 'body');
          console.log('[Bot] Could not find a Join Audio control — staying silent (no mic)');
        } else {
          console.log('[Bot] Audio did not connect in time — staying silent (no mic)');
        }
        return false;
      }

      // 3. Mute, and KEEP retrying until the SDK confirms muted. Under heavy load
      // (e.g. 10 concurrent bots) audio connects a beat after a single mute()
      // call, so one mute can miss and the bot broadcasts the fake-device tone.
      const muteDeadline = Date.now() + MUTE_CONFIRM_TIMEOUT_MS;
      let muted = false;
      while (Date.now() < muteDeadline) {
        if (client.getCurrentUser()?.muted === true) { muted = true; break; }
        try {
          await client.mute(true); // no userId = mute self
        } catch (e) {
          // audio may not be fully ready yet — retry after a beat
        }
        await sleep(MUTE_RETRY_INTERVAL_MS);
      }
      console.log(
        muted
          ? '[Bot] Audio connected (computer), mic muted'
          : '[Bot] WARNING: audio connected but could not confirm mute'
      );
      return true;
    }

    async function boot() {
      const config = window.__BOT_CONFIG__;
      if (!config) {
        console.error('[Bot] Missing __BOT_CONFIG__');
        setStatus('error');
        return;
      }

      const { signature, meetingNumber, password, userName, leaveAfterMs } = config;

      // Audio needs SharedArrayBuffer, which requires crossOriginIsolated. If this
      // logs false, the COOP/COEP headers aren't reaching the page and audio will
      // fail with OPERATION_TIMEOUT.
      console.log(
        `[Bot] crossOriginIsolated=${self.crossOriginIsolated} SAB=${typeof SharedArrayBuffer !== 'undefined'}`
      );

      // Safety cap timer always runs, regardless of leave mode (agents.md §2.6).
      setTimeout(() => leave('left-timer'), SAFETY_CAP_MS);

      try {
        // Dynamic import so a CDN/network failure surfaces as 'error'
        // rather than silently killing the module before any status is set.
        const mod = await import(SDK_URL);
        const ZoomMtgEmbedded = mod.default || mod;

        client = ZoomMtgEmbedded.createClient();
        const meetingSDKElement = document.getElementById('meetingSDKElement');

        await client.init({
          zoomAppRoot: meetingSDKElement,
          language: 'en-US',
          patchJsMedia: true,
          leaveOnPageUnload: true,
        });

        // ── Event handlers (registered before join) ────────────────────────
        // connection-change 'Closed' is the single authoritative "bot is out"
        // signal — it covers both the host ending the meeting and the host
        // removing the bot; payload.reason distinguishes the two.
        //
        // We intentionally do NOT listen to 'user-removed': in Component View
        // it fires for any participant churn (including the bot's own
        // waiting-room -> meeting transition on admission), so using it to mean
        // "I was kicked" made the bot leave immediately after being admitted.
        client.on('connection-change', (payload) => {
          const reason = String(payload?.reason ?? '');
          console.log(`[Bot] connection-change: ${payload?.state}${reason ? ' (' + reason + ')' : ''}`);
          if (payload?.state === CONNECTION_STATE_CLOSED) {
            const wasRemoved = REMOVED_REASON_HINTS.some((h) => reason.toLowerCase().includes(h));
            leave(wasRemoved ? 'left-removed' : 'left-meeting-ended');
          }
        });

        // sdkKey is intentionally omitted: removed from JoinOptions in v4.0.0
        // (the app key now travels inside the signature as appKey).
        await client.join({
          signature,
          meetingNumber,
          password: password || '',
          userName,
        });

        console.log('[Bot] Joined session');

        // ── Waiting room / on-hold handling ────────────────────────────────
        // Component View has no waiting-room event; the local user's isHold
        // flag reflects it, and changes arrive via 'user-updated'. When held,
        // report 'waiting-room' and proceed automatically once admitted.
        let entered = false;
        async function enterMeeting() {
          if (entered) return;
          entered = true;

          // Report in-meeting IMMEDIATELY so Playwright's join wait succeeds —
          // audio connect/mute must not gate this (it can take many seconds,
          // especially under a bulk launch, and would blow the join timeout).
          setStatus('in-meeting');

          // Leave Mode A: Timer (meeting-end mode handled by connection-change).
          if (leaveAfterMs !== null && leaveAfterMs !== undefined) {
            setTimeout(() => leave('left-timer'), leaveAfterMs);
          }

          // Connect computer audio (fake device) and mute, in the background, so
          // the bot shows a connected-but-muted mic. Falls back to silent if the
          // UI-driven join fails. Video stays off by default.
          connectAudio();
        }

        const me = client.getCurrentUser();
        if (me && me.isHold) {
          console.log('[Bot] Held in waiting room; awaiting admission');
          setStatus('waiting-room');
          client.on('user-updated', () => {
            if (entered) return; // admission fires user-updated repeatedly
            const current = client.getCurrentUser();
            if (current && !current.isHold) {
              console.log('[Bot] Admitted from waiting room');
              enterMeeting();
            }
          });
        } else {
          await enterMeeting();
        }
      } catch (err) {
        console.error('[Bot] Error:', err?.reason || err?.message || err);
        setStatus('error');
      }
    }

    boot();
  </script>
</body>
</html>
